name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rename_command: |
              mv target/release/rie-ioe target/release/rie-x86_64-unknown-linux-gnu

          - os: macos-latest
            rename_command: |
              mv target/release/rie-ioe target/release/rie-x86_64-apple-darwin

          - os: windows-latest
            rename_command: |
              cd target/release
              ren "rie-ioe.exe" "rie-x86_64-pc-windows-msvc.exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Build Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Configure artifact
        id: configure
        shell: bash
        run: |
          suffix=${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          
          raw_file="rie-${{ runner.arch }}-${{ matrix.os }}${suffix}"
          file_lower=$(echo "$raw_file" | tr '[:upper:]' '[:lower:]')
          echo "file_name=${file_lower}" >> $GITHUB_ENV

          mv target/release/rie-ioe${suffix} target/release/${file_lower}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/release/${{ env.file_name }}
          archive: false
